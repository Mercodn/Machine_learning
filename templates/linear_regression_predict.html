{% extends "base.html" %}

{% block title %}Prediction Form{% endblock %}

{% block content %}
<h1>Prediction Form</h1>
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" class="form-control" id="age" name="age" required min="18" max="100">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="sex" class="form-label">Sex</label>
                        <select class="form-control" id="sex" name="sex" required>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="bmi" class="form-label">BMI</label>
                        <input type="number" step="0.01" class="form-control" id="bmi" name="bmi" required min="10" max="60">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="children" class="form-label">Number of Children</label>
                        <input type="number" class="form-control" id="children" name="children" required min="0" max="10">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="smoker" class="form-label">Smoker</label>
                        <select class="form-control" id="smoker" name="smoker" required>
                            <option value="yes">Yes</option>
                            <option value="no">No</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="region" class="form-label">Region</label>
                        <select class="form-control" id="region" name="region" required>
                            <option value="northeast">Northeast</option>
                            <option value="northwest">Northwest</option>
                            <option value="southeast">Southeast</option>
                            <option value="southwest">Southwest</option>
                        </select>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Predict Insurance Charge</button>
        </form>
        
        {% if prediction %}
        <div class="alert alert-success mt-3">
            <h6>Prediction Result:</h6>
            <p>The predicted insurance charge is: <strong>${{ "%.2f"|format(prediction) }}</strong></p>
        </div>
        {% endif %}
    </div>
</div>
<a href="/linear_regression_app" class="btn btn-secondary mt-3">Back to Application Overview</a>
{% endblock %}
