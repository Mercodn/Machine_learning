<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Machine Learning in Flask{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">ML Flask App</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="mlUseCasesDropdown" role="button" data-bs-toggle="dropdown">
                            ML Use Cases
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/use_case_1">Use Case 1</a></li>
                            <li><a class="dropdown-item" href="/use_case_2">Use Case 2</a></li>
                            <li><a class="dropdown-item" href="/use_case_3">Use Case 3</a></li>
                            <li><a class="dropdown-item" href="/use_case_4">Use Case 4</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="supervisedDropdown" role="button" data-bs-toggle="dropdown">
                            Supervised Machine Learning
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/linear_regression_concepts">Basic Concepts</a></li>
                            <li><a class="dropdown-item" href="/linear_regression_app">Application</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
